<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>
Prueba Cámara
</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

</head>

<body>

<h2>
PRUEBA DE CÁMARA VERSIÓN 2
</h2>

<div
id="qr-reader"
style="width:100%;max-width:400px;">
</div>

<br>

<div
id="resultado"
style="
font-weight:bold;
color:#1a73e8;
word-break:break-all;">
</div>


<script>

function abrirCamara(){

  const lector = new Html5Qrcode("qr-reader");

  lector.start(

    {
      facingMode: "environment"
    },

    {
      fps: 10,
      qrbox: 250
    },

    function(textoLeido){

    lector.stop().then(function(){

    window.location.href = textoLeido;

    });

    },

    function(error){

      // Ignorar errores de lectura mientras busca el QR

    }

  ).catch(function(error){

    alert(error);

  });

}

window.onload = function(){

  abrirCamara();

};
  
</script>

</body>

</html>
